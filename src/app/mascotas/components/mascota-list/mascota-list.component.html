<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4><i class="bi bi-emoji-smile text-primary"></i> Mascotas</h4>
    <a routerLink="/mascotas/nueva" class="btn btn-primary">
      <i class="bi bi-plus"></i> Nueva Mascota
    </a>
  </div>
  <div class="input-group mb-4">
    <span class="input-group-text"><i class="bi bi-search"></i></span>
    <input type="text" class="form-control" placeholder="Buscar por nombre o dueño..."
           [(ngModel)]="terminoBusqueda" (input)="buscar()">
  </div>
  <div class="row g-3">
    <div class="col-md-4" *ngFor="let mascota of mascotas$ | async">
      <app-mascota-card
        [mascota]="mascota"
        [mostrarAcciones]="true"
        [modoCompacto]="false"
        (onVerHistorial)="verHistorial($event)"
        (onAgendar)="agendar($event)"
        (onEditar)="editar($event)">
      </app-mascota-card>
    </div>
  </div>
  <p class="text-muted text-center mt-4" *ngIf="(mascotas$ | async)?.length === 0">
    No se encontraron mascotas.
  </p>
</div>
